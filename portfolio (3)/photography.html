    /* ============ Photo corridor ============ */
    .corridor-wrap {
      margin-top: 16px;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent-soft) 58%, #fff 42%) 0%, var(--bg) 60%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .corridor-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .corridor-title {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.4px;
    }
    .corridor-sub {
      color: var(--text-mid);
      font-size: 0.9rem;
      margin-top: 6px;
      line-height: 1.6;
      max-width: 72ch;
    }
    .corridor-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--text-soft);
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }

    .corridor {
      --gap: 14px;
      padding: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: clamp(260px, 38vw, 420px);
      gap: var(--gap);
      -webkit-overflow-scrolling: touch;
      scrollbar-gutter: stable both-edges;
      background: rgba(255,255,255,0.35);
    }
    .corridor::-webkit-scrollbar { height: 10px; }
    .corridor::-webkit-scrollbar-thumb {
      background: color-mix(in srgb, var(--accent) 35%, #0000);
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,0.55);
    }
    .corridor::-webkit-scrollbar-track { background: rgba(255,255,255,0.35); }

    .shot {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--line-soft) 72%, transparent);
      background: rgba(255,255,255,0.82);
      box-shadow: 0 18px 48px rgba(60, 56, 42, 0.12);
      scroll-snap-align: center;
      isolation: isolate;
      transform: translateZ(0);
    }
    .shot::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(520px 220px at 30% 12%, rgba(255,255,255,0.70), transparent 56%),
        linear-gradient(135deg, rgba(0,0,0,0.04), transparent 55%);
      pointer-events: none;
      opacity: 0.45;
      z-index: 1;
    }
    .shot-img {
      width: 100%;
      height: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      transform: scale(1.02);
      transition: transform 520ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .shot:hover .shot-img { transform: scale(1.06); }
    .shot-cap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 14px 14px 12px;
      z-index: 2;
      background: linear-gradient(to top, rgba(44,44,40,0.58), rgba(44,44,40,0.08), transparent);
      pointer-events: none;
    }
    .shot-place {
      font-family: var(--serif);
      font-weight: 600;
      letter-spacing: 0.4px;
      font-size: 1.02rem;
      line-height: 1.2;
      color: rgba(255,255,255,0.94);
      text-shadow: 0 6px 18px rgba(0,0,0,0.28);
    }

    @media (max-width: 768px) {
      .corridor { grid-auto-columns: min(86vw, 420px); }
      .corridor-actions { width: 100%; justify-content: space-between; }
    }
  </style>

  <script>
    // scroll-in animation (consistent with other pages)
    const observer = new IntersectionObserver(
      (entries) => entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add("visible");
          observer.unobserve(e.target);
        }
      }),
      { threshold: 0.12 }
    );
    document.querySelectorAll(".fade-in").forEach(el => observer.observe(el));

    // wheel -> horizontal (desktop)
    const corridor = document.getElementById("corridor");
    corridor?.addEventListener("wheel", (e) => {
      // allow trackpads to behave naturally; only translate classic mouse wheel
      const isTouchLike = Math.abs(e.deltaX) > Math.abs(e.deltaY);
      if (isTouchLike) return;
      e.preventDefault();
      corridor.scrollLeft += e.deltaY * 1.1;
    }, { passive: false });
  </script>
