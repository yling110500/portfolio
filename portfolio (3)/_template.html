<!DOCTYPE html>
<!--
  ====================================================================
  子页模板 · 复制本文件改名(如 work.html / ai.html)即可创建新页面
  使用步骤:
  1. 把文件名改成你要的(如 work.html)
  2. 把 <title> 改成本页标题
  3. 在导航栏找到对应的 <a>,加上 class="active"
  4. 在 [ ===== 内容区开始 ===== ] 和 [ ===== 内容区结束 ===== ] 之间填内容
  5. 保存,双击在浏览器预览
  ====================================================================
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>页面标题 · Li Ying</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

  <!-- ============ 顶部导航(全站通用) ============ -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Li Ying</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="education.html">教育经历</a></li>
        <li><a href="work.html">实习经历</a></li>
        <li><a href="projects.html">校园经历</a></li>
        <li><a href="photography.html">更多</a></li>
      </ul>
    </div>
  </nav>

  <!-- ============ 内容主体 ============ -->
  <section class="fade-in">
    <div class="container">

      <!-- ===== 内容区开始 ===== -->

      <span class="section-num">— 0X</span>
      <h1 class="section-title">页面英文标题</h1>
      <p class="section-subtitle">页面中文副标题</p>

      <!-- 用 .card 模块组织你的内容 -->
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">主标题</div>
            <div class="card-subtitle">副标题 / 角色 / 标签</div>
          </div>
          <div class="card-meta">YYYY.MM — YYYY.MM</div>
        </div>
        <p class="card-summary">这里是简短摘要(可选)。</p>
        <ul>
          <li><strong>要点 1:</strong>正文内容,数据可用 <span class="badge">+30%</span> 高亮。</li>
          <li><strong>要点 2:</strong>正文内容。</li>
          <li><strong>要点 3:</strong>正文内容。</li>
        </ul>
      </div>

      <!-- 多个 .card 直接复制粘贴 -->

      <!-- ===== 内容区结束 ===== -->

    </div>
  </section>

  <footer>
    © 2026 Li Ying · Crafted with care · Hosted on GitHub Pages
  </footer>

  <script>
    const observer = new IntersectionObserver(
      (entries) => entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add("visible");
          observer.unobserve(e.target);
        }
      }),
      { threshold: 0.12 }
    );
    document.querySelectorAll(".fade-in").forEach(el => observer.observe(el));
  </script>
</body>
</html>
